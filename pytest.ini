# pytest.ini (repo root)
[pytest]
# Where to look for tests (you can add new packages over time)
testpaths =
    rotation/tests
    orientation/tests
    motion/tests
    forward/tests
    inverse/tests
    angular/tests
    velocity/tests
    acceleration/tests
    applied/tests
    robot/tests
    path/tests
    time/tests
    control/tests

# Default options:
# -vv  : verbose test names
# -ra  : show summary of skips/xfails
# --durations=10 : list 10 slowest tests
addopts = -vv -ra --durations=10

# Live logging to console (use logging.* in tests)
log_cli = true
log_cli_level = INFO

# Register custom markers so pytest doesn't warn
markers =
    rot: rotation kinematics tests
    cf: closed-form / symbolic tests
    slow: slow-running tests
    batch: batch job tests

# Make tracebacks readable
console_output_style = classic
